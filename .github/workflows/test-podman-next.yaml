name: Func Podman Next Test

on:
  schedule:
    - cron: '0 2 * * *'

jobs:
  test:
    name: Podman Next Test
    strategy:
      matrix:
        os: ["ubuntu-latest"]
    runs-on: ${{ matrix.os }}
    container:
      image: fedora:42
      options: --privileged
    steps:
      - name: Install Docker Engine
        run: |
          dnf install -y moby-engine iptables-nft
          # Start Docker daemon inside the container (DinD).
          # This avoids host-container path mapping issues with Kind.
          dockerd &
          timeout 30 bash -c 'until docker info >/dev/null 2>&1; do sleep 1; done'
          docker info
      - name: Install Podman Next (Nightly Build)
        run: |
          dnf copr enable rhcontainerbot/podman-next -y
          dnf install -y podman crun conmon
          podman info
      - name: Install System Dependencies
        run: dnf install -y git make curl tar gzip which procps-ng ncurses
      - name: Set Environment Variables
        run: |
          echo "KUBECONFIG=${{ github.workspace }}/hack/bin/kubeconfig.yaml" >> "$GITHUB_ENV"
          echo "PATH=${{ github.workspace }}/hack/bin:$PATH" >> "$GITHUB_ENV"
          echo "FUNC_ALLOCATE_RETRIES=5" >> "$GITHUB_ENV"
      - name: Disable CLRF conversion
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v4
      - uses: knative/actions/setup-go@main
      - name: Install Binaries
        run: ./hack/binaries.sh
      - name: Allocate Cluster
        run: ./hack/cluster.sh
      - name: Local Registry
        run: ./hack/registry.sh
      - name: Setup testing images
        run: ./hack/images.sh
      - name: Integration Test Podman
        run: ./hack/test-integration-podman.sh
      - name: Dump Cluster Logs
        if: always()
        run: ./hack/dump-logs.sh cluster_log.txt
      - name: Archive Cluster Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-logs-podman-next
          path: ./cluster_log.txt
          retention-days: 7
