coverage:
  status:
    project:
      default:
        target: auto
        threshold: 4%
    patch:
      default: false
comment:
  layout: "reach, diff, flags, files"
  # Update existing comment or create a new if deleted.
  behavior: default
ignore:
  - "testdata"
  - "**/zz*_generated.go"
  - "templates"
  - "hack"
  - "test"
  - "third_party"
