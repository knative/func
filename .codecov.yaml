coverage:
  # Commit status https://docs.codecov.io/docs/commit-status are used
  # to block PR based on coverage threshold.
  status:
    project:
      default:
        target: auto
        threshold: 4%
        # Set non-blocking status checks
        # https://docs.codecov.com/docs/common-recipe-list#set-non-blocking-status-checks
        informational: true
    patch:
      # Disable the coverage threshold of the patch, so that PRs are
      # only failing because of overall project coverage threshold.
      # See https://docs.codecov.io/docs/commit-status#disabling-a-status.
      default: false
comment:
  # Update existing comment or create new if deleted.
  behavior: default
ignore:
  - "testdata"
  - "**/zz_*generated*.go"
  - "templates"
  - "hack"
  - "test"
  - "third_party"

